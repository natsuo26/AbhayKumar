<nav class="app-bar">
  <div class="app-bar-container">
    <div class="app-bar-brand">
      <a routerLink="/home" class="brand-link" (click)="section('home')">
        <img src="profile.png" alt="Logo" class="brand-icon" />
        <span class="brand-text">Abhay Kumar</span>
      </a>
    </div>

    <div class="app-bar-menu">
      <a
        routerLink="/home"
        class="nav-link"
        routerLinkActive="active"
        [class.active]="activeSection() === 'home'"
        (click)="section('home')"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M9 22V12H15V22"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>Home</span>
      </a>

      <a
        routerLink="/projects"
        class="nav-link"
        routerLinkActive="active"
        [class.active]="activeSection() === 'projects'"
        (click)="section('projects')"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22 19V5C22 4.46957 21.7893 3.96086 21.4142 3.58579C21.0391 3.21071 20.5304 3 20 3H4C3.46957 3 2.96086 3.21071 2.58579 3.58579C2.21071 3.96086 2 4.46957 2 5V19C2 19.5304 2.21071 20.0391 2.58579 20.4142C2.96086 20.7893 3.46957 21 4 21H20C20.5304 21 21.0391 20.7893 21.4142 20.4142C21.7893 20.7893 22 19.5304 22 19Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M2 7L12 13L22 7"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>Projects</span>
      </a>

      <a
        routerLink="/skills"
        class="nav-link"
        routerLinkActive="active"
        [class.active]="activeSection() === 'skills'"
        (click)="section('skills')"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>Skills</span>
      </a>

      <a
        routerLink="/experience"
        class="nav-link"
        routerLinkActive="active"
        [class.active]="activeSection() === 'experience'"
        (click)="section('experience')"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle
            cx="12"
            cy="7"
            r="4"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>Experience</span>
      </a>
    </div>

    <button
      class="mobile-menu-toggle"
      (click)="toggleMobileMenu()"
      [class.active]="isMobileMenuOpen"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="mobile-menu" [class.open]="isMobileMenuOpen">
    <a
      routerLink="/home"
      class="mobile-nav-link"
      routerLinkActive="active"
      [class.active]="activeSection() === 'home'"
      (click)="closeMobileMenu(); section('home')"
      >Home</a
    >
    <a
      routerLink="/projects"
      class="mobile-nav-link"
      routerLinkActive="active"
      [class.active]="activeSection() === 'projects'"
      (click)="closeMobileMenu(); section('projects')"
      >Projects</a
    >
    <a
      routerLink="/skills"
      class="mobile-nav-link"
      routerLinkActive="active"
      [class.active]="activeSection() === 'skills'"
      (click)="closeMobileMenu(); section('skills')"
      >Skills</a
    >
    <a
      routerLink="/experience"
      class="mobile-nav-link"
      routerLinkActive="active"
      [class.active]="activeSection() === 'experience'"
      (click)="closeMobileMenu(); section('experience')"
      >Experience</a
    >
  </div>
</nav>
