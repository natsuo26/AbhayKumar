<div class="container">
  <h1>Experience</h1>
  @for (experience of experiences; track experience.title) {
    <app-experience-item-component
      [experienceTitle]="experience.title"
      [experienceCompany]="experience.company"
      [experienceStart]="experience.start"
      [experienceEnd]="experience.end"
      [experienceDescription]="experience.description"
      [experienceTechnologies]="experience.technologies"
    ></app-experience-item-component>
  }
</div>
