<div class="project-container">
  <div class="project-title">
    <h2>{{ projectTitle() }}</h2>
  </div>
  <div class="project-description">
    <p>{{ projectDescription() }}</p>
  </div>
  <div class="link">
    <a [href]="projectLink()" target="_blank" rel="noopener noreferrer">
      <mat-icon svgIcon="github"></mat-icon
    ></a>
  </div>
</div>
